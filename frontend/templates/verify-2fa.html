<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Verify Multi-Factor Authentication Code — ITBIS">
    <title>Verify 2FA — ITBIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Include Tailwind CSS CDN for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            50: '#e0e7ff',
                            600: '#6366f1',
                            700: '#4f46e5',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[420px] bg-white border border-slate-200 rounded-2xl shadow-xl p-8 relative z-10 transition-all duration-200 hover:shadow-2xl">
        <!-- Logo & Header -->
        <div class="text-center mb-6">
            <div class="w-12 h-12 bg-gradient-to-tr from-indigo-600 to-violet-500 text-white rounded-xl inline-flex items-center justify-center mb-3 text-2xl shadow-md">
                📱
            </div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Two-Factor Verification</h1>
            <p class="text-sm text-slate-500 mt-1">Enter the 6-digit code from your Google Authenticator app.</p>
        </div>

        <!-- Verify Form -->
        <form id="verify-2fa-form" class="space-y-4">
            <div>
                <label for="mfa-code" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Verification Code</label>
                <input type="text" id="mfa-code" maxlength="6" pattern="[0-9]{6}" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-900 placeholder-slate-400 bg-white focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-600/10 shadow-sm text-center font-mono tracking-[0.75em] text-lg" placeholder="000000" required autofocus autocomplete="one-time-code">
            </div>

            <button type="submit" id="verify-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg text-sm shadow-md shadow-indigo-600/10 hover:shadow-indigo-600/20 active:scale-[0.99] transition-all flex items-center justify-center gap-2">
                Verify & Log In
            </button>
        </form>

        <!-- Footer -->
        <div class="text-center mt-6 text-xs text-slate-500">
            Having trouble? <a href="/login" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-all">Back to login</a>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/auth.js"></script>
    <script>
        // Redirect if already fully logged in
        redirectIfAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');

        if (!email) {
            window.location.href = '/login';
        }

        // Handle verification form submit
        document.getElementById('verify-2fa-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('mfa-code').value.trim();
            const btn = document.getElementById('verify-btn');

            if (code.length !== 6 || isNaN(code)) {
                showToast('Please enter a valid 6-digit numeric code', 'error');
                return;
            }

            btn.innerHTML = '<div class="spinner"></div> Verifying...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/2fa/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code }),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Verification failed');
                }

                // Authentication succeeded
                setAuthenticatedFlag(true);
                showToast('Verification successful!', 'success');
                setTimeout(() => window.location.href = '/dashboard', 500);

            } catch (err) {
                showToast(err.message, 'error');
                btn.innerHTML = 'Verify & Log In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
