version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: auth-system-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: insider_threat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: auth-system-backend
    environment:
      DATABASE_URL: postgresql://postgres:password123@db:5432/insider_threat
      SECRET_KEY: supersecretkeyforinsiderthreatidentities123!
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./mock_users_dataset.json:/app/mock_users_dataset.json

  frontend:
    build: ./frontend
    container_name: auth-system-frontend
    ports:
      - "3000:80"  # Expose web app on localhost:3000
    depends_on:
      - backend

volumes:
  pgdata:
